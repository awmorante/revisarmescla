# ══════════════════════════════════════════════════════════════
# amor.conf — Perfil "Amor"
# Mismo motor que 'che', pero con más margen de respuesta y un
# tono más cercano/conversacional. Pensado para charlar, no solo
# para pedir comandos.
# Se carga con: alias amor='source ~/compartido/amor/config/amor.conf && python3 ~/compartido/amor/che.py'
# ══════════════════════════════════════════════════════════════

export CHE_PERFIL="Amor"

# Mismo modelo, pero más tokens y un poco más de temperatura
# (más "creativo", menos seco que el perfil che)
export CHE_MODELO_GROQ="llama-3.3-70b-versatile"
export CHE_TEMPERATURA="0.4"
export CHE_MAX_TOKENS="700"

# Esto se suma al system prompt base de che.py
export CHE_PERSONALIDAD="Sos más cálido y conversador que de costumbre. Si la pregunta no es técnica, podés explayarte un poco más en vez de ser ultra seco."

# Búsqueda web en tiempo real (mismo proveedor que el resto, podés desactivarla acá si querés)
export CHE_BUSQUEDA="true"
export SEARCH_PROVIDER="tavily"        # tavily | brave | none
export SEARCH_MAX_RESULTS="3"
export SEARCH_CONTEXT_CHARS="2000"
