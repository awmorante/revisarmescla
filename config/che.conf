# ══════════════════════════════════════════════════════════════
# che.conf — Perfil "Che"
# CLI rápido para Linux/redes/Python. Respuestas cortas, al hueso.
# Se carga con: alias che='source ~/compartido/amor/config/che.conf && python3 ~/compartido/amor/che.py'
#
# Las API KEYS (GROQ_API_KEY, GEMINI_API_KEY, TAVILY_API_KEY, etc.)
# NO van acá — esas quedan una sola vez en ~/.bashrc. Este archivo
# solo define COMPORTAMIENTO, así lo podés subir a GitHub sin drama.
# ══════════════════════════════════════════════════════════════

export CHE_PERFIL="Che"

# Modelo y parámetros de generación
export CHE_MODELO_GROQ="llama-3.3-70b-versatile"
export CHE_TEMPERATURA="0.1"
export CHE_MAX_TOKENS="400"

# Texto extra que se suma al system prompt base (dejalo vacío para el tono default)
export CHE_PERSONALIDAD=""

# Búsqueda web en tiempo real
export CHE_BUSQUEDA="true"
export SEARCH_PROVIDER="tavily"        # tavily | brave | none
export SEARCH_MAX_RESULTS="3"
export SEARCH_CONTEXT_CHARS="2000"
